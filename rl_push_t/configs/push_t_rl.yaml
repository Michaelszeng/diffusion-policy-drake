# PPO training configuration for the Drake Push-T task.
# These are the defaults used by rl_push_t/ppo.py.
# Override via CLI: poetry run python rl_push_t/ppo.py --n_envs=32

env:
  slider_pickle: arbitrary_shape_pickles/small_t_pusher.pkl
  goal_pose:
    x: 0.587
    y: -0.0355
    theta: 0.0
  pusher_start:
    x: 0.587
    y: 0.15
    theta: 0.0
  action_scale: 0.05          # metres per step
  max_episode_steps: 200       # 200 steps × 0.1 s = 20 s per episode
  control_dt: 0.1              # seconds per RL step
  success_overlap_thresh: 0.9  # fraction of goal T area that must be covered
  rand_xy: 0.15                # ± randomisation of slider start around goal (m)

train:
  seed: 1
  n_envs: 16                   # number of parallel Drake environments (AsyncVectorEnv)
  num_steps: 16                # rollout length per environment per update
  total_timesteps: 100_000_000

  # Optimiser
  lr: 3.0e-4
  anneal_lr: true

  # PPO
  gamma: 0.99
  gae_lambda: 0.9
  num_minibatches: 32
  update_epochs: 8
  clip_coef: 0.2
  clip_vloss: true
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.1
  norm_adv: true

  # Evaluation
  eval_freq: 50                # evaluate every N gradient updates
  n_eval_envs: 4
  num_eval_steps: 200

  # Checkpointing / logging
  save_freq: 100               # save checkpoint every N gradient updates
  log_dir: runs/

  # Network
  # actor: Linear(10,256)→Tanh→256→Tanh→256→Tanh→2
  # critic: Linear(10,256)→Tanh→256→Tanh→256→Tanh→1
  obs_dim: 10
  act_dim: 2
